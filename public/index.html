<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResidentFlow — Scheduling</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0f2d4a;
      --navy-mid: #1a4068;
      --teal: #0b8c87;
      --teal-light: #0fb5ae;
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface-2: #f7fafc;
      --text: #1a2a3a;
      --text-muted: #5a7080;
      --border: #dce6ef;
      --error: #dc3545;
      --warning: #f59e0b;
      --success: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }
    h1, h2, h3 { font-family: 'DM Serif Display', serif; }

    /* Sidebar */
    #sidebar {
      width: 240px;
      background: var(--navy);
      min-height: 100vh;
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      z-index: 100;
      box-shadow: 4px 0 24px rgba(15,45,74,0.18);
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo h1 {
      color: #fff;
      font-size: 1.4rem;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .sidebar-logo span {
      color: var(--teal-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-section {
      padding: 8px 16px 4px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-link.active {
      background: rgba(11,140,135,0.2);
      color: var(--teal-light);
      border-left-color: var(--teal-light);
    }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    /* Main layout */
    #main {
      margin-left: 240px;
      min-height: 100vh;
    }
    #topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 1px 8px rgba(15,45,74,0.06);
    }
    .topbar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      color: var(--navy);
    }
    #content { padding: 32px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(15,45,74,0.05), 0 1px 3px rgba(15,45,74,0.04);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-header h2 {
      font-size: 1.1rem;
      margin: 0;
      color: var(--navy);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 2px 8px rgba(11,140,135,0.3);
    }
    .btn-primary:hover { background: var(--teal-light); box-shadow: 0 3px 12px rgba(11,140,135,0.4); }
    .btn-navy {
      background: var(--navy);
      color: #fff;
      box-shadow: 0 2px 8px rgba(15,45,74,0.2);
    }
    .btn-navy:hover { background: var(--navy-mid); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
    .btn-danger { background: var(--error); color: #fff; }
    .btn-danger:hover { background: #b02a37; }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }

    /* Form elements */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .form-input:focus, .form-select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(11,140,135,0.12);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* Tables */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface-2); }
    .data-table .actions { display: flex; gap: 6px; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .badge-teal { background: rgba(11,140,135,0.12); color: var(--teal); }
    .badge-navy { background: rgba(15,45,74,0.1); color: var(--navy); }
    .badge-error { background: rgba(220,53,69,0.1); color: var(--error); }
    .badge-warning { background: rgba(245,158,11,0.12); color: #b45309; }
    .badge-success { background: rgba(16,185,129,0.1); color: #059669; }
    .badge-gray { background: rgba(90,112,128,0.1); color: var(--text-muted); }

    /* Schedule grid */
    .schedule-grid-wrapper { overflow-x: auto; }
    .schedule-grid {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 100%;
    }
    .schedule-grid th {
      padding: 8px 10px;
      background: var(--navy);
      color: rgba(255,255,255,0.85);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .schedule-grid th.resident-col {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 20;
      background: var(--navy);
    }
    .schedule-grid td {
      padding: 6px 8px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      text-align: center;
      vertical-align: middle;
      min-width: 90px;
      max-width: 90px;
    }
    .schedule-grid td.resident-name-cell {
      text-align: left;
      font-weight: 600;
      background: var(--surface-2);
      position: sticky;
      left: 0;
      z-index: 5;
      white-space: nowrap;
      padding: 6px 12px;
      min-width: 160px;
      max-width: 160px;
    }
    .rotation-cell {
      border-radius: 6px;
      padding: 4px 6px;
      line-height: 1.3;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .rotation-cell.pto-weeks {
      font-size: 0.65rem;
      color: rgba(0,0,0,0.5);
      margin-top: 2px;
    }
    .violation-cell { outline: 2px solid var(--error); outline-offset: -2px; border-radius: 6px; }
    .violation-warning { outline-color: var(--warning); }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(15,45,74,0.04);
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--navy); font-family: 'DM Serif Display', serif; }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,45,74,0.45);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(15,45,74,0.25);
    }
    .modal h2 { font-size: 1.3rem; margin: 0 0 20px; color: var(--navy); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* Violation list */
    .violation-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .violation-item.error { background: rgba(220,53,69,0.08); border: 1px solid rgba(220,53,69,0.2); }
    .violation-item.warning { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); }
    .violation-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* Loader */
    .loader {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Auth pages */
    .auth-wrapper {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 50%, #0b3d5e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    .auth-logo { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--navy); margin-bottom: 4px; }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 28px; }

    /* PTO submit page */
    .week-picker { display: flex; flex-wrap: wrap; gap: 8px; }
    .week-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .week-btn:hover { border-color: var(--teal); }
    .week-btn.selected { background: var(--teal); border-color: var(--teal); color: #fff; }
    .week-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      max-width: 340px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #0d3d30; color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    #toast.error { background: #3d1015; color: #fca5a5; border: 1px solid rgba(220,53,69,0.3); }
    #toast.info { background: var(--navy); color: rgba(255,255,255,0.9); }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.3; display: block; }
    .empty-state p { margin: 0; font-size: 0.9rem; }

    .pgy-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(15,45,74,0.08);
      color: var(--navy-mid);
    }
    .invite-link-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.8rem;
      font-family: monospace;
      word-break: break-all;
      color: var(--teal);
    }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .checkbox-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--teal); }

    /* Editable schedule cells */
    .editable-cell { cursor: pointer; transition: opacity 0.12s; }
    .editable-cell:hover { opacity: 0.78; }

    /* Schedule detail tabs */
    .schedule-tab {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .schedule-tab svg { width: 14px; height: 14px; }
    .schedule-tab:hover { color: var(--text); }
    .schedule-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

    /* Print styles */
    @media print {
      #sidebar, #topbar, .btn, .schedule-tab, [id^="tab-panel-log"] { display: none !important; }
      #main { margin-left: 0 !important; }
      #content { padding: 0 !important; }
      .card { box-shadow: none !important; border: 1px solid #ccc !important; }
      .schedule-grid th { background: #1a2a3a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: white !important; }
    }
  </style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>
<script src="/app.js"></script>
</body>
</html>
